name: Build
on:
  push:

permissions:
  contents: write
jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: "temurin"
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build --stacktrace
          ls build/jar
      - name: Get plugin version
        if: github.ref == 'refs/heads/main'
        id: get_version
        run: |
          pluginVersion=$(grep '^pluginVersion=' gradle.properties)
          echo "$pluginVersion"
          echo "$pluginVersion" >> $GITHUB_OUTPUT
      - name: Check if tag exists locally
        if: github.ref == 'refs/heads/main'
        id: check_tag
        env:
          PLUGIN_VERSION: ${{ steps.get_version.outputs.pluginVersion }}
        run: |
          tag="v${PLUGIN_VERSION}"
          echo "Checking if tag '$tag' exists..."
          git fetch --tags
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag exists."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $tag does not exist."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to release
        if: steps.check_tag.outputs.exists == 'false' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          TAG: "v${{ steps.get_version.outputs.pluginVersion }}"
        run: |
          gh release create ${TAG} ./build/jar/*.jar

      - name: Upload to Modrinth
        if: steps.check_tag.outputs.exists == 'false' && github.ref == 'refs/heads/main'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |-
          ./gradlew modrinth
